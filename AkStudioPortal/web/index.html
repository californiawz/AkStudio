<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AkStudio Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-main">
          <div class="mark">AK</div>
          <div class="brand-copy">
            <h1>AkStudio</h1>
            <p>Game Dev Dashboard</p>
          </div>
        </div>
        <button id="sidebarToggleBtn" class="sidebar-toggle" title="收起侧栏">‹</button>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-tab="home" data-short="主页">控制台</button>
        <button class="nav-item" data-open-app="repo-manager" data-short="仓库">仓库管理</button>
        <button class="nav-item" data-open-app="builder" data-short="构建">构建发布</button>
        <button class="nav-item" data-open-app="lua-viewer" data-short="代码">Lua 阅读器</button>
        <button class="nav-item" data-open-app="obsidian" data-short="记忆">AI 记忆库</button>


      </nav>

    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p>统一进入仓库管理、构建发布、Lua 阅读器和 AI 记忆库。</p>
        </div>
        <div class="top-actions">
          <button id="fullscreenActiveBtn" class="hidden">全屏</button>
          <button id="refreshAppsBtn">刷新状态</button>

        </div>


      </header>

      <section class="notice">
        <strong>本地工作台</strong>
        <span>参考 GitHub Dashboard 的浅色、卡片、侧栏和 Tab 工作区布局。这里不复制业务逻辑，只统一入口。</span>
      </section>

      <section id="homeView" class="view active">
        <div id="appGrid" class="app-grid"></div>
      </section>

      <section id="notesView" class="view notes-view">
        <div class="notes-layout">
          <aside class="notes-panel">
            <div class="notes-head">
              <strong>AI 记忆库</strong>
              <span id="notesCount">0 篇</span>
            </div>
            <input id="notesSearch" class="notes-search" placeholder="搜索笔记文件..." />
            <div id="notesList" class="notes-list"></div>
          </aside>
          <article class="note-reader">
            <div class="note-reader-head">
              <div>
                <h3 id="noteTitle">选择一篇笔记</h3>
                <p id="notePath">Obsidian Markdown 笔记会直接在这里展示。</p>
              </div>
              <div class="note-actions">
                <button id="noteEditBtn" class="hidden">编辑</button>
                <button id="noteSaveBtn" class="hidden">保存</button>
                <button id="noteCancelBtn" class="hidden">取消</button>
              </div>
            </div>
            <textarea id="noteContent" class="note-content" readonly>请选择左侧笔记。</textarea>
          </article>
        </div>
      </section>

      <section class="workspace hidden">
        <div id="tabBar" class="tab-bar"></div>
        <div id="frameHost" class="frame-host"></div>
      </section>
    </main>
  </div>


  <script src="/app.js"></script>

</body>
</html>
